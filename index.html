<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growth School</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:linear-gradient(135deg,#111827,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.box{
    width:330px;
    background:#1f2937;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

#error{
    margin-top:10px;
    color:#ff5a5a;
}

</style>
</head>

<body>

<div class="box">

<h1>Start Your Journey Today</h1>

<input type="password"
id="pass"
placeholder="Enter Passcode">

<button onclick="checkPass()">
Continue
</button>

<p id="error"></p>

</div>

<script>

function checkPass(){

let pass =
document.getElementById("pass").value;

if(pass === "2012"){

window.location.href = "steps.html";

}
else{

document.getElementById("error").innerHTML =
"Wrong Password";

}

}

</script>

</body>
</html>
